name: Bug Report
description: Something is not working as expected
title: '[Bug]: '
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: Thank you for taking the time to file a bug report!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Minimal code snippet that reproduces the issue.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include error messages if any.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: rageval version
      placeholder: 'e.g. 0.1.0'
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 'e.g. 22.15.0'
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider
      options:
        - Anthropic
        - OpenAI
        - Both
        - Not applicable
    validations:
      required: true
